---
- name: Install SFTPGo
  apt:
    deb: "https://github.com/drakkan/sftpgo/releases/download/v{{ sftpgo_version }}/sftpgo_{{ sftpgo_version }}-1_{{ deb_arch }}.deb"

- name: Create SFTPGo Working Directory
  file:
    name: "{{ app_base }}/sftpgo"
    state: directory
    owner: azuracast
    group: www-data
    mode: 0775

- name: Configure SFTPGo
  template:
    src: sftpgo.json.j2
    dest: "/etc/sftpgo/sftpgo.json"
    force: true
    mode: 0644

- name: Install SFTPGo Supervisord conf
  template:
    src: supervisor.conf.j2
    dest: /etc/supervisor/conf.d/sftpgo.conf
    force: true
    mode: 0644

- name: Disable SFTPGo service
  service:
    name: "sftpgo"
    enabled: false
    state: stopped
  ignore_errors: true
