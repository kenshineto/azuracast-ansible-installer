---
- name: Clear OPAM directory
  file:
    path: "{{ app_base }}/.opam"
    state: absent

- name: Install Liquidsoap Dependencies
  apt:
    name: "{{ packages }}"
    install_recommends: false
  vars:
    packages:
      - libao-dev
      - libasound2-dev
      - libavcodec-dev
      - libavdevice-dev
      - libavfilter-dev
      - libavformat-dev
      - libavutil-dev
      - libfaad-dev
      - libfdk-aac-dev
      - libflac-dev
      - libfreetype-dev
      - libgd-dev
      - libjack-dev
      - libjpeg-dev
      - liblo-dev
      - libmad0-dev
      - libmagic-dev
      - libmp3lame-dev
      - libopus-dev
      - libpng-dev
      - libportaudio2
      - libpulse-dev
      - libsamplerate0-dev
      - libsdl2-dev
      - libsdl2-ttf-dev
      - libsdl2-image-dev
      - libshine-dev
      - libsoundtouch-dev
      - libspeex-dev
      - libsrt-openssl-dev
      - libswresample-dev
      - libswscale-dev
      - libtag1-dev
      - libtheora-dev
      - libtiff-dev
      - libx11-dev
      - libxpm-dev
      - bubblewrap
      - ffmpeg

- name: Install Optional Audio Plugins
  apt:
    name: "{{ packages }}"
    install_recommends: false
  vars:
    packages:
      - frei0r-plugins-dev
      - ladspa-sdk
      - multimedia-audio-plugins
      - swh-plugins
      - tap-plugins
      - lsp-plugins-ladspa

- name: Install Liquidsoap
  apt:
    deb: "https://github.com/savonet/liquidsoap/releases/download/v{{ liquidsoap_version }}/liquidsoap_{{ liquidsoap_version }}-debian-{{ debian_version_name }}-ocaml{{ liquidsoap_ocaml_version }}-1_{{ deb_arch }}.deb"

- name: Link Liquidsoap binary
  file:
    src: "/usr/bin/liquidsoap"
    dest: /usr/local/bin/liquidsoap
    state: link
    force: true

- name: Create Liquidsoap Directory
  file:
    name: "{{ app_base }}/liquidsoap"
    state: directory
    owner: azuracast
    group: www-data
    mode: 0755

- name: Copy Liquidsoap liqs
  copy:
    src: "{{ item }}"
    dest: "{{ app_base }}/liquidsoap"
    owner: azuracast
    group: www-data
    mode: 0644
  loop:
    - azuracast.liq
    - crossfade.liq
    - utilities.liq
